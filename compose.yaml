name: observability

services:
  authorization:
    image: authorization:latest
    hostname: ${AUTHORIZATION_SERVICE_HOSTNAME}
    build:
      context: .
      dockerfile: Authorization/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    ports:
      - "${AUTHORIZATION_SERVICE_PORT}:${AUTHORIZATION_CONTAINER_PORT}"
    environment:
      - ASPNETCORE_URLS=${AUTHORIZATION_ASPNETCORE_URLS}
      - ASPNETCORE_ENVIRONMENT=${AUTHORIZATION_ASPNETCORE_ENVIRONMENT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - DOTNET_RUNNING_IN_CONTAINER=${DOTNET_RUNNING_IN_CONTAINER}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - ${DOCKER_NETWORK}
    depends_on:
      alloy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${AUTHORIZATION_CONTAINER_PORT}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8s
      
  user:
    image: user:latest
    hostname: ${USER_SERVICE_HOSTNAME}
    build:
      context: .
      dockerfile: User/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    ports:
      - "${USER_SERVICE_PORT}:${USER_CONTAINER_PORT}"
    environment:
      - ASPNETCORE_URLS=${USER_ASPNETCORE_URLS}
      - ASPNETCORE_ENVIRONMENT=${USER_ASPNETCORE_ENVIRONMENT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - AUTHORIZATION_SERVICE_URL=${AUTHORIZATION_SERVICE_URL}
      - DOTNET_RUNNING_IN_CONTAINER=${DOTNET_RUNNING_IN_CONTAINER}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - ${DOCKER_NETWORK}
    depends_on:
      authorization:
        condition: service_started
      alloy:
        condition: service_started
    restart: unless-stopped
#    deploy:
#      replicas: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${USER_CONTAINER_PORT}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8s
      
  alloy:
     container_name: ${ALLOY_SERVICE_NAME}
     image: grafana/alloy:latest
     hostname: ${ALLOY_SERVICE_HOSTNAME}
     command: run /etc/alloy/alloy-config.alloy --server.http.listen-addr=0.0.0.0:${ALLOY_WEB_PORT}
     volumes:
       - ./alloy/config.alloy:/etc/alloy/alloy-config.alloy:ro
       - /var/run/docker.sock:/var/run/docker.sock
     ports:
       - "${ALLOY_PORT}:${ALLOY_CONTAINER_PORT}"
       - "${ALLOY_WEB_PORT}:${ALLOY_WEB_PORT}"
     networks:
       - ${DOCKER_NETWORK}
     restart: unless-stopped
     environment:
       - LOG_LEVEL=info
     healthcheck:
       test:
         - "CMD-SHELL"
         - "bash -c 'exec 3<>/dev/tcp/localhost/${ALLOY_WEB_PORT}; echo -e \"GET /-/healthy HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -1 <&3 | grep -q \"200\"'"
       interval: 30s
       timeout: 5s
       retries: 3
       start_period: 8s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped

  mimir:
     container_name: ${MIMIR_SERVICE_NAME}
     image: grafana/mimir:latest
     hostname: ${MIMIR_SERVICE_HOSTNAME}
     command: -config.file=/etc/mimir/config.yaml
     volumes:
       - ./mimir/mimir-config.yaml:/etc/mimir/config.yaml:ro
       - mimir-data:/mimir
     ports:
       - "${MIMIR_PORT}:${MIMIR_CONTAINER_PORT}"
     networks:
       - ${DOCKER_NETWORK}
     restart: unless-stopped
     healthcheck:
       test: [ "CMD", "wget", "-O-", "http://localhost:${MIMIR_CONTAINER_PORT}/ready" ]
       interval: 30s
       timeout: 5s
       retries: 3
       start_period: 8s

  # ============================================
  # Grafana Tempo (Distributed Tracing Backend)
  # ============================================
#  tempo:
#    container_name: ${TEMPO_SERVICE_NAME}
#    image: grafana/tempo:latest
#    hostname: ${TEMPO_SERVICE_HOSTNAME}
#    command: [ "-config.file=/etc/tempo.yaml" ]
#    volumes:
#      - ./tempo/tempo-config.yaml:/etc/tempo.yaml:ro
#    ports:
#      - "${TEMPO_PORT}:${TEMPO_CONTAINER_PORT}"
#    networks:
#      - ${DOCKER_NETWORK}
#    restart: unless-stopped
#    healthcheck:
#      test: [ "CMD-SHELL", "wget -qO- http://localhost:3200/ready | grep -q 'ready' || exit 1" ]
#      interval: 30s
#      timeout: 5s
#      retries: 3
#      start_period: 8s

  # ============================================
  # Grafana Loki (Log Aggregation)
  # ============================================
  loki:
    container_name: ${LOKI_SERVICE_NAME}
    image: grafana/loki:latest
    hostname: ${LOKI_SERVICE_HOSTNAME}
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT}:${LOKI_CONTAINER_PORT}"
    networks:
      - ${DOCKER_NETWORK}
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8s

  # ============================================
  # Grafana (Visualization UI)
  # ============================================
  grafana:
    container_name: ${GRAFANA_SERVICE_NAME}
    image: grafana/grafana:latest
    hostname: ${GRAFANA_SERVICE_HOSTNAME}
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_CONTAINER_PORT}"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_ENABLED}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_ANONYMOUS_ORG_ROLE}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - ${DOCKER_NETWORK}
    depends_on:
#       tempo:
#         condition: service_started
       loki:
         condition: service_started
#       mimir:
#         condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8s
      
      
networks:
  user-services-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          
volumes:
  loki-data:
    driver: local
  mimir-data:
    driver: local
