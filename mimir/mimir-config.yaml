multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: info

frontend:
  query_stats_enabled: true

querier:
  max_concurrent: 20

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

distributor:
  ring:
    kvstore:
      store: memberlist

memberlist:
  join_members: []

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /mimir/blocks

blocks_storage:
  tsdb:
    dir: /mimir/tsdb
  bucket_store:
    sync_dir: /mimir/bucket_cache

compactor:
  data_dir: /mimir/compactor

ruler:
  enable_api: true
  rule_path: /mimir/ruler-tmp

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /mimir/ruler

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /mimir/alertmanager

limits:
  max_label_names_per_series: 50
  max_global_series_per_user: 150000
  max_global_series_per_metric: 10000
  ingestion_rate: 10000
  ingestion_burst_size: 200000